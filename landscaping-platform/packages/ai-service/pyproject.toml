[project]
name = "landscaping-ai-service"
version = "0.1.0"
description = "AI microservices for landscaping platform"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "python-multipart>=0.0.9",
    "asyncpg>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.35",
    "pgvector>=0.2.0",
    "openai>=1.50.0",
    "anthropic>=0.38.0",
    "sentence-transformers>=3.0.0",
    "pillow>=10.4.0",
    "numpy>=1.26.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0"
]

[project.optional-dependencies]
dev = ["pytest>=8.3.0", "pytest-asyncio>=0.24.0", "ruff>=0.6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py311"
